<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>飞机失事模拟 - Cesium 3D</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="cesiumContainer"></div>

  <!-- 控制面板 -->
  <div id="controlPanel">
    <button id="panelToggle" class="panel-toggle" title="折叠面板">◀</button>
    <div class="panel-inner">
      <div class="panel-header">
        <h2>飞机失事模拟</h2>
        <span id="simStatus" class="status-badge idle">就绪</span>
      </div>
      <div class="panel-body">
        <div class="info-row">
          <span class="label">模拟时间</span>
          <span id="simTime" class="value">00:00</span>
        </div>
        <div class="info-row">
          <span class="label">飞行阶段</span>
          <span id="simPhase" class="value">待命</span>
        </div>
        <div class="progress-bar">
          <div id="progressFill" class="fill"></div>
        </div>
        <div class="btn-group">
          <button id="btnPlay" class="btn btn-play">▶ 开始模拟</button>
          <button id="btnPause" class="btn btn-pause" disabled>⏸ 暂停</button>
          <button id="btnReset" class="btn btn-reset">↻ 重置</button>
        </div>
        <div class="terrain-section">
          <div class="section-title">地表起伏</div>
          <div class="info-row">
            <span class="label">夸张系数</span>
            <span id="exaggValue" class="value">3.0x</span>
          </div>
          <input type="range" id="exaggSlider" class="terrain-slider"
                 min="1" max="8" step="0.5" value="3" />
        </div>
        <div class="radar-section">
          <div class="section-title">雷达扫描</div>
          <div class="info-row">
            <span class="label">扫描半径</span>
            <span id="radarRadiusValue" class="value">150 km</span>
          </div>
          <input type="range" id="radarRadiusSlider" class="terrain-slider"
                 min="30" max="300" step="10" value="150" />
        </div>
      </div>
    </div>
  </div>

  <!-- 雷达设置面板 -->
  <div id="radarPanel">
    <button id="radarPanelToggle" class="panel-toggle radar-toggle" title="折叠面板">◀</button>
    <div class="panel-inner">
      <div class="panel-header">
        <h2>雷达设置</h2>
        <label class="switch">
          <input type="checkbox" id="radarEnabled" checked>
          <span class="switch-slider"></span>
        </label>
      </div>
      <div class="panel-body">
        <div class="info-row">
          <span class="label">部署经度</span>
          <input type="number" id="radarLon" class="coord-input" step="0.0001" value="116.5980">
        </div>
        <div class="info-row">
          <span class="label">部署纬度</span>
          <input type="number" id="radarLat" class="coord-input" step="0.0001" value="40.0730">
        </div>
        <div class="info-row">
          <span class="label">基座高程</span>
          <span id="radarHeightValue" class="value">50 m</span>
        </div>
        <input type="range" id="radarHeightSlider" class="terrain-slider"
               min="10" max="500" step="10" value="50" />
        <div class="info-row">
          <span class="label">扫描半径</span>
          <span id="radarPanelRadiusValue" class="value">150 km</span>
        </div>
        <input type="range" id="radarPanelRadiusSlider" class="terrain-slider"
               min="30" max="300" step="10" value="150" />
        <div class="info-row checkbox-row">
          <span class="label">半球可视化</span>
          <input type="checkbox" id="showHemisphere" checked>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
